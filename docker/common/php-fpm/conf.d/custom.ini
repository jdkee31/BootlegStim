; Increase memory for Laravel (composer, queues, etc.)
memory_limit = 512M

; File upload settings (important for forms, APIs)
upload_max_filesize = 50M
post_max_size = 50M

; Execution time (avoid timeout on heavy requests)
max_execution_time = 60

; Timezone (VERY important for Laravel)
date.timezone = Asia/Kuala_Lumpur

; Error reporting (dev vs prod differs)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Opcache (improves performance)
opcache.enable=1
opcache.validate_timestamps=1
opcache.revalidate_freq=0

; For Laravel queues / long jobs
max_input_time = 60